{{/* Google Fonts — Fraunces (display) + Inter (body) */}}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

{{/* Favicons */}}
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<meta name="theme-color" content="#F5EFE3">

{{/* Open Graph default image */}}
<meta property="og:image" content="{{ .Site.BaseURL }}og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="{{ .Site.BaseURL }}og-image.png">

{{- if .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "Shelterwood AI",
  "legalName": "Shelterwood AI Inc.",
  "url": "https://shelterwood.ai",
  "logo": "https://shelterwood.ai/brand/logo.svg",
  "description": "Canadian holding company building a portfolio of AI-native businesses.",
  "foundingDate": "2026",
  "foundingLocation": {
    "@type": "Place",
    "address": {
      "@type": "PostalAddress",
      "addressLocality": "Toronto",
      "addressRegion": "Ontario",
      "addressCountry": "CA"
    }
  },
  "areaServed": "CA",
  "knowsAbout": ["Artificial Intelligence", "Healthcare IT", "Software Development", "Canadian Technology"]
}
</script>
{{- end }}
